name: Tally News Aggregator

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'

      - name: Run aggregator
        run: go run main.go

      - name: Commit and push changes
        run: |
          git config --global user.name "tally-bot"
          git config --global user.email "actions@github.com"
          git add latest.json public/
          git commit -m "chore: update news aggregator [skip ci]" || echo "No changes to commit"
          git push
